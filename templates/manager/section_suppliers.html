<div class="card">
    <div class="card-info">
        <div class="card-item">
            <h3>{{content.name}}</h3>
        </div>
        <div class="card-item">
            <p><b>Email:</b> {{content.email}}</p>
        </div>
        <div class="card-item">
            <p><b>Address:</b> {{content.address}}</p>
        </div>
        <div class="card-item">
            <p><b>Contact Person:</b> {{content.contact_person}}</p>
        </div>
    </div>
    <div class="card-options">
        <button>
            <i class="fa-solid fa-pen-to-square"></i>
        </button>
        <button>
            <i class="fas fa-trash-alt"></i>
        </button>
    </div>
</div>
