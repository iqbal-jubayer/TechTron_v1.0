{% extends "frontview/base.html" %}

{% load static %}

{% block title %}TechTron - Home{% endblock title %}

{% block links %}
<link rel="stylesheet" href="{% static 'frontview/account_settings.css'%}">
{% endblock links %}

{% block body %}
<div class="main-container">
    <form action="/manager/dashboard/create/products/" method="post">
        {% csrf_token %}
        <div class="main-container-upper">
            <div class="main-container-upper-left">
                <div class="main-container-item" style="padding-bottom: 25px;">
                    <p>Product Name :</p>
                </div>
                <div class="main-container-item" style="padding-bottom: 25px;">
                    <p>Brand:</p>
                </div>
                <div class="main-container-item" style="padding-bottom: 25px;">
                    <p>Model:</p>
                </div>
                <div class="main-container-item" style="padding-bottom: 25px;">
                    <p>Specs:</p>
                </div>
                <div class="main-container-item" style="padding-bottom: 25px;">
                    <p>Weight:</p>
                </div>
                <div class="main-container-item" style="padding-bottom: 25px;">
                    <p>Price:</p>
                </div>
                <div class="main-container-item" style="padding-bottom: 25px;">
                    <p>Supplier:</p>
                </div>
            </div>
            <div class="main-container-upper-right">
                <div class="main-container-item">
                    <input class="mytextinput" name="name" type="text" placeholder="Name"
                        value="{{product.product_name}}" required>
                </div>
                <div class="main-container-item">
                    <input class="mytextinput" name="brand" type="text" placeholder="Brand" value="{{product.brand}}"
                        required>
                </div>
                <div class="main-container-item">
                    <input class="mytextinput" name="model" type="text" placeholder="Model"
                        value="{{product.model_number}}" required>
                </div>
                <div class="main-container-item">
                    <textarea class="mytextinput" name="specs" id="">{{product.specs}}</textarea>
                </div>
                <div class="main-container-item">
                    <input class="mytextinput" name="weight" type="number" step="any" placeholder="Weight"
                        value="{{product.weight}}" required> g
                </div>
                <div class="main-container-item">
                    <input class="mytextinput" name="price" type="number" step="any" placeholder="Price"
                        value="{{product.price}}" required> BDT
                </div>
                <div class="main-container-item">
                    <select class="mytextinput" name="supplier" id="">
                        {% for supplier in suppliers%}
                        <option value="{{supplier.supplier_id}}" {% if supplier.supplier_id == product.supplier_id %}selected{% endif %}>{{supplier.name}}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
        </div>
        <div class="main-container-bottom">
            <button class="mybtn">Add</button>
        </div>
    </form>
</div>
{% endblock body %}
